# PR-Agent (advisory) configuration for AS215932/hyrule-web.
#
# Replaces the hosted Sourcery reviewer. Runs ONLY on the unprivileged
# `hyrule-public-pr` runner with read/comment-only permissions, on our own
# OpenRouter key. Advisory: no auto-merge, no code writes, no deploy access.

[config]
git_provider = "github"
# deepseek-v4-flash (primary) and minimax-m2.7 (fallback) are NOT in PR-Agent's
# built-in model list, so they are used as *custom* models — which requires
# custom_model_max_tokens to be set explicitly. (Also pinned via CONFIG__* env
# in pr-agent.yml so the model is honoured before this file reaches main.)
model = "openrouter/deepseek/deepseek-v4-flash"
fallback_models = ["openrouter/minimax/minimax-m2.7"]
custom_model_max_tokens = 128000
temperature = 0.2
use_repo_settings_file = true
publish_output = true

[github_action_config]
# What runs automatically on each PR (advisory only). /ask, /improve, /review
# etc. remain available as slash commands to trusted authors.
auto_review = true
auto_describe = false
auto_improve = true

[pr_reviewer]
require_security_review = true
require_tests_review = true
require_score_review = true
require_estimate_effort_to_review = true
extra_instructions = """
This is the AS215932 customer-facing web app: Python(uv) backend + TS/Vite
frontend, deployed via an SHA-pinned, committed-dist git-checkout model with a
committed-dist guard and required `test` + `frontend` checks. Flag, with
specifics:
- frontend trust-boundary issues: unsafe HTML/DOM injection (innerHTML,
  dangerouslySetInnerHTML), insecure crypto/randomness, secrets or API keys in
  client code, and payment/order/chain values trusted from the client instead
  of re-derived/validated server-side;
- the chain/payment list being hardcoded in the frontend instead of read from
  the backend;
- changes that weaken or bypass the test/coverage gate or the committed-dist
  guard, or that hand-edit built `dist/` artifacts;
- any deploy that checks out / pulls `main` instead of an SHA-pinned ref;
- secrets committed to files; added `pull_request_target`; broad GITHUB_TOKEN
  permissions or `permissions: write-all`; Docker-socket exposure in steps;
- any pull_request job moved onto a privileged self-hosted runner label
  (`hyrule` / `hyrule-infra`) instead of `hyrule-public-pr`.
Do not restate the diff; surface risk, missing tests, and operational footguns.
"""

[pr_description]
publish_description_as_comment = true
