name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref. Per-branch grouping so a push to main
# doesn't kill an open PR's CI on a different branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Branch protection requires this exact check name. Don't rename without
    # updating the rule in repo settings.
    name: test
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # actions/setup-python has no Debian 13 build for 3.12; the runner
      # ships system Python 3.13 which satisfies the project's
      # requires-python = ">=3.12" and matches the web VM in production.
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync deps (system python)
        run: ~/.local/bin/uv sync --frozen --group dev

      - name: Ruff
        run: ~/.local/bin/uv run ruff check .

      - name: Mypy (strict)
        run: ~/.local/bin/uv run mypy hyrule_web/

      - name: Pytest + 90% line+branch coverage gate
        run: |
          ~/.local/bin/uv run pytest \
            --cov=hyrule_web \
            --cov-report=term-missing \
            --cov-branch \
            --cov-fail-under=90

  frontend:
    # Issue #14: TypeScript/Vite/Tailwind frontend bundle. Add this check name to
    # branch protection alongside `test`. Don't rename without updating the rule.
    name: frontend
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # npm 11 — must match the npm that generated package-lock.json, else
          # `npm ci` rejects the lock (npm 10 mis-reads npm-11 nested deps). node
          # 24 LTS ships npm 11.
          node-version: "24"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prettier (check)
        run: npx prettier --check .

      - name: ESLint
        run: npx eslint .

      - name: Stylelint
        run: npx stylelint "frontend/src/**/*.css"

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Vitest + coverage
        run: npx vitest run --coverage

      - name: Build
        run: npx vite build

      # The built bundle is committed (the web host has no Node; the deploy
      # git-checks-out the repo). Fail if the committed dist drifts from a fresh
      # build so an SHA-pinned rollback always ships matching assets.
      - name: Drift guard — committed dist must equal a fresh build
        run: |
          if ! git diff --quiet -- hyrule_web/static/dist; then
            echo "::error::hyrule_web/static/dist is stale — run 'npm run build' and commit it."
            git --no-pager diff --stat -- hyrule_web/static/dist
            exit 1
          fi
